# 示例配置文件
server:
  host: "localhost"
  port: 8080
  timeout: 30

database:
  host: "localhost"
  port: 5432
  username: "admin"
  password: "secret"
  max_connections: 100
  ssl_enabled: true

logging:
  level: "info"
  file: "/var/log/app.log"
  max_size: 100

features:
  enable_cache: true
  enable_metrics: true
  allowed_origins:
    - "https://example.com"
    - "https://api.example.com"